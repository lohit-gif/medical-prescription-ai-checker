<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Medical AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
            from { transform: translateY(20px); opacity: 0; }
        }
        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }
        h2 { font-weight: 700; color: #064e3b; margin-bottom: 8px; }
        p.subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; }
        .form-control {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 0.95rem;
            color: #334155;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: #ffffff;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .btn-brand {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }
        .btn-brand:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(16, 185, 129, 0.3);
            color: white;
        }
        .position-relative { margin-bottom: 20px; }
        .alert { border-radius: 12px; border: none; }
        .bottom-link { color: #64748b; font-size: 0.9rem; margin-top: 25px; display: block; }
        .bottom-link a { color: #10b981; font-weight: 600; text-decoration: none; }
        .bottom-link a:hover { color: #059669; text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card text-center">
    <div class="brand-icon">
        <i class="fa-solid fa-user-doctor"></i>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join Medical AI and streamline your workflow</p>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-circle-exclamation me-2"></i>{{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="position-relative text-start">
            <label class="form-label" style="font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Full Name</label>
            <input class="form-control" name="username" type="text" placeholder="Dr. John Doe" required>
        </div>
        <div class="position-relative text-start">
            <label class="form-label" style="font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Email Address</label>
            <input class="form-control" name="email" type="email" placeholder="doctor@clinic.com" required>
        </div>
        <div class="position-relative text-start">
            <label class="form-label" style="font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Create Password</label>
            <input class="form-control" name="password" type="password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-brand mt-2">Get Started <i class="fa-solid fa-arrow-right ms-2"></i></button>
    </form>

    <div class="bottom-link">
        Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
</div>

</body>
</html>
