<!DOCTYPE html>

<html lang="en">

<head>
    

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medical AI Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f4c81,#3a7bd5);
    font-family:Arial, sans-serif;
}

.login-card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
}

.login-title{
    text-align:center;
    margin-bottom:25px;
    color:#0f4c81;
    font-weight:bold;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.btn-login{
    width:100%;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
}

.register-link{
    text-align:center;
    margin-top:15px;
    color:black;
}

.register-link a{
    color:black;
    text-decoration:none;
    font-weight:bold;
}

.register-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-card">

```
<h2 class="login-title">
    🩺 Medical Prescription AI Checker
</h2>

<form method="POST">

    <input
    class="form-control mb-3"
    name="username"
    placeholder="Username"
    required>

    <input
    class="form-control mb-3"
    name="password"
    type="password"
    placeholder="Password"
    required>

    <button type="submit" class="btn btn-primary btn-login">
        Login
    </button>

</form>

<div class="register-link">

    Don't have an account?

    <br>

    <a href="/register">
        Create Account

        <p class="text-center mt-3">

<a href="/forgot_password">

Forgot Password?

</a>

</p>

    </a>

</div>
```

</div>

</body>

</html>
